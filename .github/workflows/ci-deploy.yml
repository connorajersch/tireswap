name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_id:
        description: Optional explicit release id
        required: false
        type: string

env:
  APP_DIR: /opt/tireswap

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release id
        id: release
        shell: bash
        run: |
          if [[ -n "${{ inputs.release_id }}" ]]; then
            release_id="${{ inputs.release_id }}"
          else
            release_id="$(date -u +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}"
          fi
          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend tests
        run: cargo test --manifest-path backend/Cargo.toml --locked

      - name: Frontend typecheck
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run typecheck

      - name: Build backend
        run: ./scripts/build_backend.sh

      - name: Build frontend
        run: ./scripts/build_frontend.sh

      - name: Package release artifact
        run: SKIP_BUILD=1 ./scripts/package_release.sh "${{ steps.release.outputs.release_id }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: tireswap-release-${{ steps.release.outputs.release_id }}
          path: |
            dist/tireswap-${{ steps.release.outputs.release_id }}.tar.gz
            dist/tireswap-${{ steps.release.outputs.release_id }}.tar.gz.sha256
          if-no-files-found: error

  deploy-vps:
    runs-on: ubuntu-latest
    needs: build-test-package
    if: ${{ github.ref == 'refs/heads/main' && secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.VPS_SSH_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: tireswap-release-${{ needs.build-test-package.outputs.release_id }}
          path: dist

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        shell: bash
        run: |
          set -euo pipefail
          port="${VPS_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$port" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          RELEASE_ID: ${{ needs.build-test-package.outputs.release_id }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        shell: bash
        run: |
          set -euo pipefail
          port="${VPS_SSH_PORT:-22}"
          artifact="dist/tireswap-${RELEASE_ID}.tar.gz"

          ssh -p "$port" "${VPS_USER}@${VPS_HOST}" "mkdir -p '${APP_DIR}/artifacts'"
          scp -P "$port" "$artifact" "${VPS_USER}@${VPS_HOST}:${APP_DIR}/artifacts/"
          scp -P "$port" scripts/deploy_vps.sh "${VPS_USER}@${VPS_HOST}:/tmp/tireswap-deploy_vps.sh"

          ssh -p "$port" "${VPS_USER}@${VPS_HOST}" "chmod +x /tmp/tireswap-deploy_vps.sh && APP_DIR='${APP_DIR}' /tmp/tireswap-deploy_vps.sh '${RELEASE_ID}' && rm -f /tmp/tireswap-deploy_vps.sh"

      - name: Smoke check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        shell: bash
        run: |
          set -euo pipefail
          port="${VPS_SSH_PORT:-22}"
          ssh -p "$port" "${VPS_USER}@${VPS_HOST}" "curl --fail --silent --show-error http://127.0.0.1/health >/dev/null"
